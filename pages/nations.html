<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>民族名录 - 中华56民族</title>
  <meta name="description" content="全面了解中国56个民族的基本信息、分布区域、人口状况、文化特色等详细资料。">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .nations-page {
      padding-top: 64px;
      min-height: 100vh;
    }

    .page-header {
      background: linear-gradient(135deg, #5E35B1 0%, #3949AB 100%);
      color: white;
      padding: var(--spacing-xxl) 0;
      text-align: center;
    }

    .filter-section {
      background: white;
      padding: var(--spacing-lg) 0;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 64px;
      z-index: 100;
    }

    .filter-container {
      display: flex;
      gap: var(--spacing-md);
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    .filter-btn {
      padding: var(--spacing-sm) var(--spacing-md);
      border: 1px solid #ddd;
      border-radius: var(--radius-full);
      background: white;
      color: var(--text-secondary);
      font-size: 0.9rem;
      transition: all var(--transition-fast);
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--color-zhu-red);
      color: white;
      border-color: var(--color-zhu-red);
    }

    .nations-grid {
      padding: var(--spacing-xxl) 0;
    }

    .nations-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--spacing-lg);
    }

    .nation-card {
      background: white;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: all var(--transition-normal);
      cursor: pointer;
    }

    .nation-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .nation-card-image {
      height: 160px;
      background: linear-gradient(135deg, var(--color-zhu-red), #B71C1C);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 3rem;
      font-weight: 700;
    }

    .nation-card-content {
      padding: var(--spacing-lg);
    }

    .nation-card-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: var(--spacing-xs);
    }

    .nation-card-pinyin {
      font-size: 0.85rem;
      color: var(--text-tertiary);
      margin-bottom: var(--spacing-sm);
    }

    .nation-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-xs);
      margin-bottom: var(--spacing-md);
    }

    .nation-card-tag {
      padding: 2px 8px;
      background: rgba(211, 47, 47, 0.1);
      color: var(--color-zhu-red);
      border-radius: var(--radius-full);
      font-size: 0.75rem;
    }

    .nation-card-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .search-highlight {
      background: rgba(211, 47, 47, 0.2);
      padding: 0 2px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <!-- 头部导航 -->
  <header class="header">
    <div class="container header-content">
      <a href="../index.html" class="logo">
        <div class="logo-icon">民</div>
        <span>中华56民族</span>
      </a>
      
      <nav class="main-nav">
        <a href="../index.html" class="nav-link">首页</a>

        <a href="shop.html" class="nav-link">特色商品</a>
      </nav>
      
      <div class="header-actions">
        <div class="search-box">
          <input type="text" placeholder="搜索民族、文化...">
          <button class="search-btn">
            <i class="fas fa-search"></i>
          </button>
        </div>
        <button class="mobile-menu-btn">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- 移动端菜单 -->

  <!-- 主要内容 -->

        <p class="page-description">探索中国56个民族的独特文化与历史传承</p>
      </div>
    </div>

    <!-- 筛选区域 -->
    <div class="filter-section">
      <div class="container">
        <div class="filter-container">
          <button class="filter-btn active" data-filter="all">全部</button>
          <button class="filter-btn" data-filter="north">北方地区</button>

    <!-- 民族列表 -->

    </div>
