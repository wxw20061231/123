<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>搜索 - 中华56民族</title>
  <meta name="description" content="搜索民族、文化、历史等内容。">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .search-page {
      padding-top: 64px;
      min-height: 100vh;
      background-color: #f5f5f5;
    }

    .search-hero {
      background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('../images/search.beijingtu.jpg');
      background-size: cover;
      background-position: center;
      color: white;
      padding: var(--spacing-xxl) 0;
      text-align: center;
    }

    .search-box-large {
      max-width: 600px;
      margin: 0 auto;
      position: relative;
    }

    .search-input-large {
      width: 100%;
      padding: var(--spacing-lg) var(--spacing-xxl);
      padding-right: 60px;
      border: none;
      border-radius: var(--radius-full);
      font-size: 1.125rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .search-input-large:focus {
      outline: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .search-btn-large {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--color-zhu-red);
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
    }

    .search-btn-large:hover {
      background: #B71C1C;
      transform: translateY(-50%) scale(1.1);
    }

    .search-content {
      padding: var(--spacing-xxl) 0;
    }

    .search-results {
      max-width: 1200px;
      margin: 0 auto;
    }

    .result-tabs {
      display: flex;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-xl);
      border-bottom: 2px solid #eee;
      padding-bottom: var(--spacing-sm);
    }

    .result-tab {
      padding: var(--spacing-sm) var(--spacing-lg);
      border-radius: var(--radius-full);
      font-size: 0.95rem;
      color: var(--text-secondary);
      transition: all var(--transition-fast);
      cursor: pointer;
    }

    .result-tab:hover,
    .result-tab.active {
      background: var(--color-zhu-red);
      color: white;
    }

    .result-section {
      margin-bottom: var(--spacing-xl);
    }

    .result-section-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: var(--spacing-lg);
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .result-section-title i {
      color: var(--color-zhu-red);
    }

    .result-count {
      font-size: 0.9rem;
      color: var(--text-tertiary);
      font-weight: 400;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: var(--spacing-lg);
    }

    .result-card {
      background: #f9f9f9;
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      box-shadow: var(--shadow-sm);
      transition: all var(--transition-normal);
      cursor: pointer;
    }

    .result-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .result-card-type {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(211, 47, 47, 0.1);
      color: var(--color-zhu-red);
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: var(--spacing-sm);
    }

    .result-card-title {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: var(--spacing-sm);
      color: var(--text-primary);
    }

    .result-card-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .no-results {
      text-align: center;
      padding: var(--spacing-xxl);
      color: var(--text-secondary);
    }

    .no-results-icon {
      font-size: 4rem;
      margin-bottom: var(--spacing-lg);
      color: var(--text-tertiary);
    }

    .no-results-text {
      font-size: 1.125rem;
      margin-bottom: var(--spacing-md);
    }

    .no-results-suggestion {
      font-size: 0.95rem;
      color: var(--text-tertiary);
    }

    /* 搜索历史 */
    .search-history {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--spacing-xl) 0;
    }

    .history-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: var(--spacing-md);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clear-history {
      font-size: 0.85rem;
      color: var(--color-zhu-red);
      cursor: pointer;
      transition: color var(--transition-fast);
    }

    .clear-history:hover {
      color: #B71C1C;
      text-decoration: underline;
    }

    .history-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-sm);
    }

    .history-tag {
      padding: var(--spacing-xs) var(--spacing-md);
      background: var(--background-color);
      border-radius: var(--radius-full);
      font-size: 0.9rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .history-tag:hover {
      background: #e8e6e3;
      color: var(--text-primary);
    }
  </style>
</head>

        </p>
        <div class="search-box-large">

    </div>

    <!-- 搜索内容 -->
    <div class="search-content">
      <div class="container">
